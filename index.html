<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Games Hub</h1>
</header>

<div id="games" class="grid"></div>

<script>
fetch("games.json")
    .then(res => res.json())
    .then(games => {
        const container = document.getElementById("games");
        games.forEach(game => {
            container.innerHTML += `
                <div class="card" onclick="location.href='viewer.html?game=${game.id}'">
                    <img src="${game.image}">
                    <h2>${game.name}</h2>
                </div>
            `;
        });
    });
</script>

</body>
</html>
