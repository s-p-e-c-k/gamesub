<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Viewer</title>
    <style>
        body, html {
            margin: 0;
            height: 100%;
            background: black;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #back {
            position: fixed;
            top: 15px;
            left: 15px;
            padding: 10px 15px;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div id="back" onclick="history.back()">← Back</div>

<iframe id="gameFrame"></iframe>

<script>
const params = new URLSearchParams(location.search);
const gameId = params.get("game");

fetch("games.json")
    .then(res => res.json())
    .then(games => {
        const game = games.find(g => g.id === gameId);
        if (game) {
            document.getElementById("gameFrame").src = game.url;
        }
    });
</script>

</body>
</html>
